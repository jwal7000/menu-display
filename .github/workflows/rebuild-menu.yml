name: Rebuild Menu

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note (e.g. "updated seasonal flavors")'
        required: false
        default: ''

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Write service account credentials
        run: |
          mkdir -p ~/.config/gcloud
          echo '${{ secrets.GCP_SHEETS_KEY }}' > /tmp/gcp-sheets-key.json

      - name: Rebuild menu.json from Google Sheets
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_CREDENTIALS_PATH: /tmp/gcp-sheets-key.json
        run: npm run build-menu-sheets

      - name: Commit and push updated menu.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/menu.json
          if git diff --cached --quiet; then
            echo "No changes to menu.json — skipping commit."
          else
            NOTE="${{ github.event.inputs.note }}"
            MSG="chore: rebuild menu.json from Google Sheets"
            if [ -n "$NOTE" ]; then
              MSG="$MSG — $NOTE"
            fi
            git commit -m "$MSG"
            git push
          fi
