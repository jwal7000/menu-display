<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Five Daughters Bakery — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Connection warning banner (hidden by default) -->
  <div id="connection-warning" class="connection-warning hidden" aria-live="polite">
    <span class="warning-icon">⚠</span>
    Menu data unavailable — showing last known menu
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-wordmark">Five Daughters Bakery</div>
      <div class="header-tagline">Handcrafted in Franklin, TN</div>
    </div>
    <div class="header-divider" aria-hidden="true"></div>
    <div class="header-right">
      <span id="location-name" class="header-location"></span>
    </div>
  </header>

  <!-- Main menu grid -->
  <main id="menu-root" class="menu-root" aria-label="Menu">
    <div class="loading-state">
      <span class="loading-text">Loading menu…</span>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <span id="footer-location" class="footer-location"></span>
    <span class="footer-sep" aria-hidden="true">·</span>
    <span id="footer-updated" class="footer-updated"></span>
  </footer>

  <script src="menu.js"></script>
</body>
</html>
